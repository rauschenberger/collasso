name: pip-audit

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-python@v6
      with:
        python-version: "3.14"
    - name: Install dependencies
      run: |
        python -m pip install -e .
    - uses: pypa/gh-action-pip-audit@v1.1.0
      with:
        inputs: --skip-editable