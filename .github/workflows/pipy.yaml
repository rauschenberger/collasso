# source: https://packaging.python.org/en/latest/guides/publishing-package-distribution-releases-using-github-actions-ci-cd-workflows/

name: pypi

on: push

jobs:
  build:
    name: build
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6
      with:
        persist-credentials: false
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: "3.x"
    - name: install
      run: >-
        python3 -m
        pip install
        build
        --user
    - name: build
      run: python3 -m build
    - name: store
      uses: actions/upload-artifact@v5
      with:
        name: python-package-distributions
        path: dist/

  publish-to-pypi:
    name: PyPI
    if: startsWith(github.ref, 'refs/tags/')
    needs:
    - build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/collasso
    permissions:
      id-token: write

    steps:
    - name: download
      uses: actions/download-artifact@v6
      with:
        name: python-package-distributions
        path: dist/
    - name: publish
      uses: pypa/gh-action-pypi-publish@release/v1

  publish-to-testpypi:
    name: TestPyPI
    needs:
    - build
    runs-on: ubuntu-latest

    environment:
      name: testpypi
      url: https://test.pypi.org/p/collasso

    permissions:
      id-token: write

    steps:
    - name: download
      uses: actions/download-artifact@v6
      with:
        name: python-package-distributions
        path: dist/
    - name: publish
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        repository-url: https://test.pypi.org/legacy/
